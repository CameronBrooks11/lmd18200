; PlatformIO Project Configuration for RampAndBrake example
; Adjust 'board' to match your target hardware.
; Run `pio run -t upload` to build and flash.

[env:uno]
platform = atmelavr
board = uno
framework = arduino
lib_deps =
    CameronBrooks11/LMD18200@^0.1.1

[env:nano]
platform = atmelavr
board = nanoatmega328new
framework = arduino
lib_deps =
    CameronBrooks11/LMD18200@^0.1.1

[env:due]
platform = atmelsam
board = due
framework = arduino
lib_deps =
    CameronBrooks11/LMD18200@^0.1.1
